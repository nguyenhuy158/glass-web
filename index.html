<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My learn...</title>

    <link rel="icon" href="https://image.flaticon.com/icons/png/512/2371/2371580.png" />
    <link href="https://unpkg.com/ionicons@4.5.10-0/dist/css/ionicons.min.css" rel="stylesheet" />

<body>

    <div class="container">
        <div class="container__user">
            <div class="user__info">
                <div class="img">

                        alt="">
                </div>
                <div class="name">Lorem, ipsum.</div>
                <div class="vip">Pro Member</div>
            </div>
            <!--     links -->
            <div class="user__links">
                <div class="link">
                    <i class="material-icons">telegram</i>
                    <span>Telegram</span>
                </div>

                <div class="link">
                    <i class="material-icons">reddit</i>
                    <span>Reddit</span>
                </div>

                <div class="link">
                    <i class="material-icons">discord</i>
                    <span>Discord</span>
                </div>

                <div class="link">
                    <i class="material-icons">tiktok</i>
                    <span>Tiktok</span>
                </div>

            </div>
            <!--     card-ad -->
            <div class="ad">
                <span>Lorem ipsum dolor sit amet.</span>
                <img src="https://images.unsplash.com/10/wii.jpg?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=750&q=80"
                    alt="">

        </div>

        <div class="main">

                <h1>Active Game</h1>
                <input type="text" placeholder="Enter game">
            </div>

            <div class="main__games">
                <div class="game ">
                    <div class="game__img">

                            alt="">
                    </div>
                    <div class="game__info">
                        <h2>Lorem ipsum dolor sit.</h2>
                        <span>Mobile</span>
                        <div class="process"></div>
                    </div>
                    <div class="game__process">69%</div>
                </div>

                <div class="game ">
                    <div class="game__img">
                        <img src="https://images.unsplash.com/photo-1585504198199-20277593b94f?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=877&q=80"
                            alt="">
                    </div>
                    <div class="game__info">
                        <h2>Lorem ipsum dolor sit.</h2>

                        <div class="process"></div>
                    </div>
                    <div class="game__process">69%</div>
                </div>

                <div class="game ">

                        <img src="https://images.unsplash.com/photo-1585504198199-20277593b94f?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=877&q=80"
                            alt="">
                    </div>
                    <div class="game__info">
                        <h2>Lorem ipsum dolor sit.</h2>
                        <span>Mobile</span>
                        <div class="process"></div>
                    </div>
                    <div class="game__process">69%</div>
                </div>
            </div>
        </div>
    </div>
    </div>
    </div>
